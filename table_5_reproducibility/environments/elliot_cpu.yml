# Elliot reproducibility environment (CPU-only variant).
# Installs Elliot from the official GitHub repo. All models used in Table 5
# (ItemKNN, LightGCN, ProxyRecommender) ship with Elliot itself:
#   - elliot.recommender.neighbors.item_knn.ItemKNN
#   - elliot.recommender.graph_based.lightgcn.LightGCN     (TensorFlow-backed)
#   - elliot.recommender.generic.Proxy.ProxyRecommender
# No external/ directory or extra model sources are needed.
name: table_5_reproducibility_elliot
channels:
  - conda-forge
dependencies:
  - python=3.8
  - pip=24.0
  - setuptools=70.3.0
  - wheel=0.43.0
  - requests
  - pip:
    - PyYAML==6.0.1
    - XlsxWriter==3.2.0
    - hyperopt==0.2.5
    - matplotlib==3.7.5
    - openpyxl==3.1.5
    - pandas==2.0.3
    - pillow==10.4.0
    - scikit-learn==1.3.2
    - seaborn==0.13.2
    - numpy==1.24.4
    - scipy==1.10.1
    - tqdm>=4.66.0
    # TensorFlow (CPU) — used by Elliot's built-in LightGCN.
    - tensorflow==2.13.0
    # Elliot upstream.
    - git+https://github.com/sisinflab/elliot.git
