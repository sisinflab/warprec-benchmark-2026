reader:
  loading_strategy: dataset
  data_type: transaction
  reading_method: local
  local_path: ../dataset/ml-32m/ratings.csv
  rating_type: explicit
  sep: ','
  labels:
    user_id_label: userId
    item_id_label: movieId
writer:
  dataset_name: MovieLens32M-EASE-Serial
  writing_method: local
  local_experiment_path: experiments/
splitter:
  test_splitting:
    strategy: random_holdout
    ratio: 0.1
dashboard:
  wandb:
    enabled: True
    team: your_wandb_team_here
    project: warprec-benchmark-2026
    group: MovieLens32M-Serial
    api_key: your_wandb_api_key_here
    upload_checkpoints: False
  codecarbon:
    enabled: True
    save_to_file: True
    output_dir: experiments/MovieLens32M-EASE-Serial/codecarbon/
models:
  EASE:
    l2: [100, 200, 500, 750, 1000, 2000]
evaluation:
  top_k: [10]
  metrics: [nDCG, Precision, Recall, HitRate, MAP]
  validation_metric: nDCG@10
  strategy: full
general:
  device: cuda
