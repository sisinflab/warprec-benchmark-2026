reader:
  loading_strategy: dataset
  data_type: transaction
  reading_method: local
  local_path: ../datasets/netflix-prize-100m/ratings_processed.csv
  rating_type: explicit
  sep: ','
  labels:
    user_id_label: user_id
    item_id_label: item_id
    rating_label: rating
    timestamp_label: timestamp
writer:
  dataset_name: Netflix100M-Estimate
  writing_method: local
  local_experiment_path: experiments/Netflix100M-Estimate/
splitter:
  test_splitting:
    strategy: random_holdout
    ratio: 0.1

# Probe budget for iterative models.
# warmup_batches: skipped from timing (let CUDA caches warm up)
# train_batches:  measured train iterations -> RAM/VRAM peak
# eval_batches:   reserved (not used by this script yet)
estimate:
  warmup_batches: 2
  train_batches: 5
  eval_batches: 5

models:
  # --- Analytical path: closed-form, CPU-only ---
  EASE:
    l2: [100, 200, 500, 750, 1000, 2000]
  ItemKNN:
    k: [50, 100, 200, 500, 1000, 2000]
    similarity: cosine

  # --- Probing path: iterative DL models on GPU ---
  LightGCN:
    embedding_size: [64, 128, 256]
    n_layers: [2, 3]
    reg_weight: 0.001
    batch_size: 8192
    epochs: 2
    learning_rate: 0.001
  NeuMF:
    optimization:
      block_size: 3000
    mf_embedding_size: [64, 128, 256]
    mlp_embedding_size: 64
    mlp_hidden_size: [[64, 32]]
    mf_train: True
    mlp_train: True
    dropout: 0.1
    reg_weight: 0.001
    weight_decay: 0.0001
    batch_size: 8192
    epochs: 2
    learning_rate: 0.001
    neg_samples: [0, 1]
  SASRec:
    embedding_size: [64, 128, 256]
    n_layers: [2, 3]
    n_heads: 8
    inner_size: 512
    dropout_prob: 0.1
    attn_dropout_prob: 0.1
    reg_weight: 0.001
    weight_decay: 0.0001
    batch_size: 8192
    epochs: 2
    learning_rate: 0.0001
    neg_samples: 1
    max_seq_len: 20

evaluation:
  top_k: [10]
  metrics: [nDCG, Recall]
  validation_metric: nDCG@10
  strategy: full

general:
  device: cuda
