# WarpRec reproducibility environment (CPU-only variant).
# Installs WarpRec 1.3.0 from PyPI (this is the version used for the paper).
# The PyPI package pulls in ray/torch/polars/pyg itself; we only add CPU-side
# pins needed by the configs and helper scripts.
name: table_5_reproducibility_warprec
channels:
  - conda-forge
dependencies:
  - python=3.12.11
  - pip=25.0
  - setuptools=80.9.0
  - wheel=0.45.1
  - pip:
    - warprec==1.3.0
